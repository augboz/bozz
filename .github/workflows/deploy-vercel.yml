name: Deploy API to Vercel

# Redeploys the serverless OAuth proxies in api/ (google-token, notion-token,
# etc.) to the existing "life-bozz" Vercel project. This exists because the
# production deployment went missing (DEPLOYMENT_NOT_FOUND), breaking Gmail /
# Google Calendar / Notion token exchange. With this workflow a redeploy is one
# click (Run workflow) or happens automatically when anything under api/ changes.
#
# One-time setup: add a Vercel token as a repo secret named VERCEL_TOKEN
#   (create at https://vercel.com/account/tokens). The org/project IDs below are
#   identifiers (not secrets) taken from .vercel/project.json.

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'website/**'
      - 'vercel.json'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_wmIVdNNtkgNtV9Rt2CdnCTVK
      VERCEL_PROJECT_ID: prj_g9MFPeM2PjIGAWDYKJDAbYLaFu1f
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
