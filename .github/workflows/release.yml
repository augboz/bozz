name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_GMAIL_CLIENT_ID: ${{ secrets.VITE_GMAIL_CLIENT_ID }}
          VITE_GCAL_CLIENT_ID: ${{ secrets.VITE_GCAL_CLIENT_ID }}
          VITE_GFIT_CLIENT_ID: ${{ secrets.VITE_GFIT_CLIENT_ID }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_NOTION_CLIENT_ID: ${{ secrets.VITE_NOTION_CLIENT_ID }}
          VITE_NOTION_REDIRECT_URL: ${{ secrets.VITE_NOTION_REDIRECT_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bozz ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform below.
            If you already have Bozz installed, it will update itself automatically on next launch.
          releaseDraft: false
          prerelease: false

      - name: Upload fixed-name installer and updater files
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')

          # Fixed-name installer for easy download
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri/target/release/bundle/nsis/Bozz-setup.exe"
          gh release upload $tag "src-tauri/target/release/bundle/nsis/Bozz-setup.exe" --clobber

          # Upload NSIS zip and sig for updater (tauri build creates these when signing works)
          $nsisZip = "src-tauri/target/release/bundle/nsis/Bozz_${version}_x64-setup.nsis.zip"
          $nsisSig = "src-tauri/target/release/bundle/nsis/Bozz_${version}_x64-setup.nsis.zip.sig"

          # If tauri build didn't create the NSIS zip+sig, create and sign manually
          if (-not (Test-Path $nsisZip)) {
            $setupExe = "src-tauri/target/release/bundle/nsis/Bozz_${version}_x64-setup.exe"
            Compress-Archive -Path $setupExe -DestinationPath $nsisZip
            $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_SIGNING_PRIVATE_KEY
            npx tauri signer sign $nsisZip -k $env:TAURI_SIGNING_PRIVATE_KEY -p "$($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)"
          }

          gh release upload $tag $nsisZip --clobber
          gh release upload $tag $nsisSig --clobber

  release-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_GMAIL_CLIENT_ID: ${{ secrets.VITE_GMAIL_CLIENT_ID }}
          VITE_GCAL_CLIENT_ID: ${{ secrets.VITE_GCAL_CLIENT_ID }}
          VITE_GFIT_CLIENT_ID: ${{ secrets.VITE_GFIT_CLIENT_ID }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_NOTION_CLIENT_ID: ${{ secrets.VITE_NOTION_CLIENT_ID }}
          VITE_NOTION_REDIRECT_URL: ${{ secrets.VITE_NOTION_REDIRECT_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bozz ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Build macOS (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_GMAIL_CLIENT_ID: ${{ secrets.VITE_GMAIL_CLIENT_ID }}
          VITE_GCAL_CLIENT_ID: ${{ secrets.VITE_GCAL_CLIENT_ID }}
          VITE_GFIT_CLIENT_ID: ${{ secrets.VITE_GFIT_CLIENT_ID }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_NOTION_CLIENT_ID: ${{ secrets.VITE_NOTION_CLIENT_ID }}
          VITE_NOTION_REDIRECT_URL: ${{ secrets.VITE_NOTION_REDIRECT_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bozz ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin

      - name: Upload fixed-name DMGs and sign updater tarballs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"

          ARM_DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          INTEL_DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$ARM_DMG"   src-tauri/target/Bozz-mac-arm.dmg
          cp "$INTEL_DMG" src-tauri/target/Bozz-mac-intel.dmg
          gh release upload "$TAG" src-tauri/target/Bozz-mac-arm.dmg --clobber
          gh release upload "$TAG" src-tauri/target/Bozz-mac-intel.dmg --clobber

          # tauri-action creates tar.gz from .app; sign it ourselves
          ARM_TGZ="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Bozz.app.tar.gz"
          INTEL_TGZ="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Bozz.app.tar.gz"

          # Create tar.gz if tauri-action didn't (signing may have been skipped)
          if [ ! -f "$ARM_TGZ" ]; then
            tar czf "$ARM_TGZ" -C "$(dirname "$ARM_TGZ")" Bozz.app
          fi
          if [ ! -f "$INTEL_TGZ" ]; then
            tar czf "$INTEL_TGZ" -C "$(dirname "$INTEL_TGZ")" Bozz.app
          fi

          npx tauri signer sign "$ARM_TGZ" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
          npx tauri signer sign "$INTEL_TGZ" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"

          cp "${ARM_TGZ}.sig"   src-tauri/target/Bozz-arm64.app.tar.gz.sig
          cp "${INTEL_TGZ}.sig" src-tauri/target/Bozz-x64.app.tar.gz.sig
          gh release upload "$TAG" src-tauri/target/Bozz-arm64.app.tar.gz.sig --clobber
          gh release upload "$TAG" src-tauri/target/Bozz-x64.app.tar.gz.sig --clobber

  publish-updater:
    needs: [release-windows, release-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="augboz/bozz"

          mkdir /tmp/sigs
          gh release download "$TAG" --repo "$REPO" \
            --pattern "*.nsis.zip.sig" \
            --pattern "Bozz-arm64.app.tar.gz.sig" \
            --pattern "Bozz-x64.app.tar.gz.sig" \
            --dir /tmp/sigs

          WIN_SIG=$(cat "/tmp/sigs/Bozz_${VERSION}_x64-setup.nsis.zip.sig")
          ARM_SIG=$(cat "/tmp/sigs/Bozz-arm64.app.tar.gz.sig")
          INTEL_SIG=$(cat "/tmp/sigs/Bozz-x64.app.tar.gz.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "https://github.com/${REPO}/releases/download/${TAG}/Bozz_${VERSION}_x64-setup.nsis.zip" \
            --arg arm_sig "$ARM_SIG" \
            --arg arm_url "https://github.com/${REPO}/releases/download/${TAG}/Bozz_aarch64.app.tar.gz" \
            --arg intel_sig "$INTEL_SIG" \
            --arg intel_url "https://github.com/${REPO}/releases/download/${TAG}/Bozz_x64.app.tar.gz" \
            '{
              version: $version,
              notes: "See the GitHub release for details.",
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                "darwin-x86_64": { signature: $intel_sig, url: $intel_url }
              }
            }' > /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
