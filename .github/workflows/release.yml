name: Release

on:
  push:
    tags:
      - 'v*'

env:
  # Make cargo resilient to transient crates.io download hiccups. v0.1.25's
  # release failed with "download of regex failed: curl failed" — a flaky
  # network error, not a code problem. Retry downloads and use the git CLI.
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write   # lets SignPath verify the build via GitHub OIDC
    env:
      # Gates the SignPath signing steps below. Until this secret is set, signing
      # is skipped and the release ships unsigned exactly as before.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_GMAIL_CLIENT_ID: ${{ secrets.VITE_GMAIL_CLIENT_ID }}
          VITE_GCAL_CLIENT_ID: ${{ secrets.VITE_GCAL_CLIENT_ID }}
          VITE_GFIT_CLIENT_ID: ${{ secrets.VITE_GFIT_CLIENT_ID }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_NOTION_CLIENT_ID: ${{ secrets.VITE_NOTION_CLIENT_ID }}
          VITE_NOTION_REDIRECT_URL: ${{ secrets.VITE_NOTION_REDIRECT_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bozz ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform below.
            If you already have Bozz installed, it will update itself automatically on next launch.
          releaseDraft: false
          prerelease: false

      # ── Authenticode signing via SignPath (free for OSS projects) ──────────
      # Signs the NSIS installer so Microsoft Defender/SmartScreen stops
      # flagging it. Skipped entirely until SIGNPATH_API_TOKEN is configured.
      # The signed .exe overwrites the unsigned one in place, so the steps below
      # (fixed-name copy + updater .nsis.zip) pick up the signed binary.
      - name: Upload unsigned installer for signing
        if: env.SIGNPATH_API_TOKEN != ''
        id: unsigned_installer
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: src-tauri/target/release/bundle/nsis/*_x64-setup.exe

      - name: Sign installer with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: bozz
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned_installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: src-tauri/target/release/bundle/nsis/

      - name: Re-upload signed installer to release
        if: env.SIGNPATH_API_TOKEN != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${{ github.ref_name }}"
          signed=$(find src-tauri/target/release/bundle/nsis -name "*_x64-setup.exe" | head -1)
          gh release upload "$tag" "$signed" --clobber

      - name: Upload fixed-name installer and updater files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          tag="${{ github.ref_name }}"
          version="${tag#v}"

          # Fixed-name installer for easy download
          exe=$(find src-tauri/target/release/bundle/nsis -name "*.exe" ! -name "*.sig" | head -1)
          cp "$exe" src-tauri/target/release/bundle/nsis/Bozz-setup.exe
          gh release upload "$tag" "src-tauri/target/release/bundle/nsis/Bozz-setup.exe" --clobber

          nsisDir="src-tauri/target/release/bundle/nsis"
          nsisZip="$nsisDir/Bozz_${version}_x64-setup.nsis.zip"
          nsisSig="$nsisZip.sig"
          setupExe="Bozz_${version}_x64-setup.exe"

          # The in-app updater (tauri-plugin-updater) links the `zip` crate WITHOUT a
          # deflate decoder, so it can ONLY extract STORED (uncompressed) zips. Tauri's
          # NSIS bundler writes the updater zip with Deflate, which installed clients
          # reject at install time with "unsupported Zip archive: Compression method not
          # supported". Always repack the updater zip with no compression (-mx0) and
          # re-sign it, so the archive is extractable regardless of what the bundler
          # produced. Repacking from Bozz_${version}_x64-setup.exe also picks up the
          # SignPath-signed installer when signing ran above.
          rm -f "$nsisZip" "$nsisSig"
          ( cd "$nsisDir" && 7z a -tzip -mx0 "Bozz_${version}_x64-setup.nsis.zip" "$setupExe" )
          npx tauri signer sign "$nsisZip" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"

          gh release upload "$tag" "$nsisZip" --clobber
          gh release upload "$tag" "$nsisSig" --clobber

  release-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # The macOS DMG bundler (bundle_dmg.sh → hdiutil) intermittently fails with
      # "Resource busy" when detaching the mounted volume, because Spotlight's
      # `mds` indexes the freshly-mounted DMG and holds it open. v0.1.19's release
      # failed here ("failed to run bundle_dmg.sh") while v0.1.17/0.1.18 passed —
      # classic flake. Turning Spotlight indexing off on the runner removes the race.
      - name: Disable Spotlight indexing (prevents flaky DMG bundling)
        run: sudo mdutil -a -i off || true

      - name: Build macOS (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── Apple Developer ID signing + notarization ──────────────────────
          # When these secrets are set, tauri-action imports the Developer ID
          # cert, signs the .app with the hardened runtime, then notarizes and
          # staples it via notarytool. If they're empty (not yet configured),
          # Tauri falls back to ad-hoc signing exactly as before — no failure.
          # Setup: see docs/macos-signing.md
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_GMAIL_CLIENT_ID: ${{ secrets.VITE_GMAIL_CLIENT_ID }}
          VITE_GCAL_CLIENT_ID: ${{ secrets.VITE_GCAL_CLIENT_ID }}
          VITE_GFIT_CLIENT_ID: ${{ secrets.VITE_GFIT_CLIENT_ID }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_NOTION_CLIENT_ID: ${{ secrets.VITE_NOTION_CLIENT_ID }}
          VITE_NOTION_REDIRECT_URL: ${{ secrets.VITE_NOTION_REDIRECT_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bozz ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Build macOS (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization (see docs/macos-signing.md).
          # Empty secrets → ad-hoc fallback, same as the unsigned build.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_GMAIL_CLIENT_ID: ${{ secrets.VITE_GMAIL_CLIENT_ID }}
          VITE_GCAL_CLIENT_ID: ${{ secrets.VITE_GCAL_CLIENT_ID }}
          VITE_GFIT_CLIENT_ID: ${{ secrets.VITE_GFIT_CLIENT_ID }}
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_NOTION_CLIENT_ID: ${{ secrets.VITE_NOTION_CLIENT_ID }}
          VITE_NOTION_REDIRECT_URL: ${{ secrets.VITE_NOTION_REDIRECT_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Bozz ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin

      - name: Upload fixed-name DMGs and sign updater tarballs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"

          ARM_DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          INTEL_DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$ARM_DMG"   src-tauri/target/Bozz-mac-arm.dmg
          cp "$INTEL_DMG" src-tauri/target/Bozz-mac-intel.dmg
          gh release upload "$TAG" src-tauri/target/Bozz-mac-arm.dmg --clobber
          gh release upload "$TAG" src-tauri/target/Bozz-mac-intel.dmg --clobber

          # tauri-action creates tar.gz from .app; sign it ourselves
          ARM_TGZ="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Bozz.app.tar.gz"
          INTEL_TGZ="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Bozz.app.tar.gz"

          # Create tar.gz if tauri-action didn't (signing may have been skipped)
          if [ ! -f "$ARM_TGZ" ]; then
            tar czf "$ARM_TGZ" -C "$(dirname "$ARM_TGZ")" Bozz.app
          fi
          if [ ! -f "$INTEL_TGZ" ]; then
            tar czf "$INTEL_TGZ" -C "$(dirname "$INTEL_TGZ")" Bozz.app
          fi

          npx tauri signer sign "$ARM_TGZ" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
          npx tauri signer sign "$INTEL_TGZ" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"

          cp "${ARM_TGZ}.sig"   src-tauri/target/Bozz-arm64.app.tar.gz.sig
          cp "${INTEL_TGZ}.sig" src-tauri/target/Bozz-x64.app.tar.gz.sig
          gh release upload "$TAG" src-tauri/target/Bozz-arm64.app.tar.gz.sig --clobber
          gh release upload "$TAG" src-tauri/target/Bozz-x64.app.tar.gz.sig --clobber

  publish-updater:
    needs: [release-windows, release-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="augboz/bozz"

          mkdir /tmp/sigs
          gh release download "$TAG" --repo "$REPO" \
            --pattern "*.nsis.zip.sig" \
            --pattern "Bozz-arm64.app.tar.gz.sig" \
            --pattern "Bozz-x64.app.tar.gz.sig" \
            --dir /tmp/sigs

          WIN_SIG=$(cat "/tmp/sigs/Bozz_${VERSION}_x64-setup.nsis.zip.sig")
          ARM_SIG=$(cat "/tmp/sigs/Bozz-arm64.app.tar.gz.sig")
          INTEL_SIG=$(cat "/tmp/sigs/Bozz-x64.app.tar.gz.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "https://github.com/${REPO}/releases/download/${TAG}/Bozz_${VERSION}_x64-setup.nsis.zip" \
            --arg arm_sig "$ARM_SIG" \
            --arg arm_url "https://github.com/${REPO}/releases/download/${TAG}/Bozz_aarch64.app.tar.gz" \
            --arg intel_sig "$INTEL_SIG" \
            --arg intel_url "https://github.com/${REPO}/releases/download/${TAG}/Bozz_x64.app.tar.gz" \
            '{
              version: $version,
              notes: "See the GitHub release for details.",
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                "darwin-x86_64": { signature: $intel_sig, url: $intel_url }
              }
            }' > /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
